<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="私人檔案上傳工具。">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <meta name="theme-color" content="#f5f5f2" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#161718" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="File Hub">
    <link rel="manifest" href="manifest.webmanifest?v=1">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png?v=1">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=1">
    <link rel="stylesheet" href="styles.css">
    <title>管理檔案 · 檔案庫</title>
  </head>
  <body class="upload-page">
    <main class="app-frame upload-frame">
      <nav class="upload-topbar" aria-label="頁面導覽">
        <a class="back-link" href="index.html">
          <svg aria-hidden="true" viewBox="0 0 20 20" fill="none"><path d="m11.5 4-6 6 6 6M6 10h9" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round"/></svg>
          返回檔案庫
        </a>
        <span class="owner-mark">PRIVATE ACCESS</span>
      </nav>

      <header class="upload-intro">
        <p class="kicker">ARCHIVE CONTROL</p>
        <h1>加入一份新檔案</h1>
        <p>檔案會直接送往你的 GitHub 儲存庫。請只在自己的裝置上使用此頁面。</p>
      </header>

      <section class="upload-panel" aria-labelledby="upload-title">
        <div class="connection-bar">
          <div class="connection-state">
            <span class="state-dot" aria-hidden="true"></span>
            <span id="credential-status">未連接</span>
          </div>
          <span id="upload-mode" class="owner-mark">正在確認上傳權限…</span>
          <div class="credential-controls">
            <button id="credential-toggle" class="text-button credential-toggle" type="button" aria-expanded="false" aria-controls="credential-panel">管理憑證</button>
          </div>
        </div>

        <div class="upload-body">
          <div id="credential-panel" class="credential-panel" hidden>
            <div class="credential-copy">
              <p class="credential-title">此裝置的上傳權限</p>
              <p class="credential-description">Token 僅儲存在此瀏覽器。設定完成後，輸入欄位會保持隱藏。</p>
            </div>
            <label class="sr-only" for="github-token">GitHub Fine-grained Token</label>
            <div class="credential-input-row">
              <input id="github-token" type="password" inputmode="text" autocomplete="off" spellcheck="false" placeholder="貼上 github_pat_…">
              <button id="toggle-token" class="secondary-button" type="button">顯示</button>
            </div>
            <div class="credential-actions-row">
              <button id="save-token" class="primary-button compact-button" type="button">儲存至此裝置</button>
              <button id="clear-token" class="text-button danger-text-button" type="button">清除已儲存憑證</button>
            </div>
            <p class="security-note">清除瀏覽器網站資料或 Token 到期後，需要重新設定。</p>
          </div>

          <div id="drop-zone" class="drop-zone">
            <input id="file-input" type="file" hidden>
            <div class="drop-symbol" aria-hidden="true"><svg viewBox="0 0 28 28" fill="none"><path d="M14 18V6m0 0L9.5 10.5M14 6l4.5 4.5M6 18.5v2.25A1.25 1.25 0 0 0 7.25 22h13.5A1.25 1.25 0 0 0 22 20.75V18.5" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <p id="selected-file-name" class="drop-title">選擇檔案或拖曳到這裡</p>
            <p id="selected-file-meta" class="drop-meta">保留原始檔名，單一檔案上限 25 MB</p>
            <button id="choose-file" class="secondary-button choose-button" type="button">選擇檔案</button>
          </div>

          <div class="upload-actions">
            <button id="upload-button" class="primary-button" type="button" disabled>上傳至檔案庫</button>
            <button id="login-button" class="secondary-button" type="button" hidden>登入上傳服務</button>
          </div>

          <div id="upload-progress" class="upload-progress" hidden>
            <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
            <p id="upload-status" class="upload-status" role="status" aria-live="polite"></p>
          </div>
          <a id="post-upload-link" class="post-upload-link" href="index.html" hidden>回到檔案庫查看檔案 <span aria-hidden="true">→</span></a>
        </div>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="upload.js" defer></script>
  </body>
</html>
