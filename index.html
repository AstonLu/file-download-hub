<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="一個安靜、可靠的個人公開檔案庫。">
    <meta name="theme-color" content="#f5f5f2" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#161718" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="檔案庫">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <title>檔案庫</title>
  </head>
  <body class="archive-page">
    <main class="app-frame">
      <header class="archive-header">
        <div class="archive-ident">
          <p class="kicker">PERSONAL ARCHIVE</p>
          <div class="title-line">
            <h1>檔案庫</h1>
            <a class="constellation-link" href="upload.html" aria-label="開啟私人上傳工具" title="管理檔案">
              <svg aria-hidden="true" viewBox="0 0 28 28" fill="none">
                <circle cx="14" cy="14" r="2.2" fill="currentColor"/>
                <circle cx="5.5" cy="8" r="1.3" fill="currentColor"/>
                <circle cx="22.5" cy="7" r="1.1" fill="currentColor"/>
                <circle cx="21" cy="21.5" r="1.4" fill="currentColor"/>
                <path d="M7 8.8 12.2 12.6M15.8 12.6 21.3 7.8M15.6 15.6l4.4 4.7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </a>
          </div>
        </div>
        <p class="archive-summary">留存、分享與隨時取用。</p>
      </header>

      <section class="library" aria-labelledby="file-list-title">
        <div class="library-heading">
          <div>
            <h2 id="file-list-title">所有檔案</h2>
            <p id="file-count" class="file-count" aria-live="polite"></p>
          </div>
          <button id="refresh-button" class="text-button" type="button" hidden>重新整理</button>
        </div>

        <div id="status" class="library-state" role="status" aria-live="polite">
          <span class="quiet-spinner" aria-hidden="true"></span>
          <span>正在整理檔案…</span>
        </div>
        <ul id="file-list" class="file-list" aria-label="可下載檔案" hidden></ul>
      </section>
    </main>

    <footer class="archive-footer">
      <span>公開存取</span><span aria-hidden="true">·</span><span>由 GitHub 保存</span>
    </footer>
    <script src="app.js" defer></script>
  </body>
</html>
